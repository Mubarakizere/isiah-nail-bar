---
deployment:
  tasks:
    - export DEPLOYPATH=/home/stockcen/isaiahnailbar.com
    - /bin/cp -R * $DEPLOYPATH
    - /bin/cp .env.example $DEPLOYPATH/.env
    - cd $DEPLOYPATH
    - /usr/local/bin/composer install --no-dev --optimize-autoloader
    - /usr/local/bin/php artisan migrate --force
    # Tell Laravel where public_html/storage is so uploads land there
    - echo "FILESYSTEM_PUBLIC_ROOT=/home/stockcen/public_html/storage" >> $DEPLOYPATH/.env
    # Create/refresh the storage folder inside public_html
    - /bin/mkdir -p /home/stockcen/public_html/storage
    # Run storage:link — this will make public_html/storage point to storage/app/public
    - /usr/local/bin/php artisan storage:link --force
    - /usr/local/bin/php artisan config:cache
    - /usr/local/bin/php artisan route:cache
    - /usr/local/bin/php artisan view:cache
