---
deployment:
  tasks:
    # cPanel Git Version Control deploys into ~/repository by default
    - export DEPLOYPATH=/home/stockcen/repository
    - cd $DEPLOYPATH
    - /usr/local/bin/composer install --no-dev --optimize-autoloader
    - /usr/local/bin/php artisan migrate --force
    # Write uploads directly into public_html/storage (no symlink needed)
    - echo "FILESYSTEM_PUBLIC_ROOT=/home/stockcen/public_html/storage" >> $DEPLOYPATH/.env
    - /usr/local/bin/php artisan config:cache
    - /usr/local/bin/php artisan route:cache
    - /usr/local/bin/php artisan view:cache
